name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/x0ryz/django-pub-hackathon

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP=/opt/django-pub-hackathon

            sudo mkdir -p "$APP/environment"
            sudo chown -R "$USER:$USER" "$APP"

            cat > "$APP/environment/postgresql.env" <<'ENVEOF'
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ENVEOF

            cat > "$APP/environment/backend.env" <<'ENVEOF'
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=db
            ENVEOF

            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u x0ryz --password-stdin 2>/dev/null

            cd "$APP"
            sudo docker compose pull web
            sudo docker compose up -d

            echo "Waiting for web container..."
            for i in $(seq 1 30); do
              STATUS=$(sudo docker inspect -f '{{.State.Status}}' django-pub-backend 2>/dev/null)
              if [ "$STATUS" = "running" ]; then
                echo "Container is running after ${i}s"
                break
              fi
              echo "  status=$STATUS, retrying in 2s..."
              sleep 2
            done

            sudo docker compose logs web --tail=30

            sudo docker compose exec -T web python manage.py migrate --noinput
